<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Portfolio</title>
</head>
<body style="
    font-family: Arial, sans-serif;
    text-align: center;
    margin: 0;
    padding: 40px;
    background: linear-gradient(to right, #252936, #12151b);
  ">

  <!-- Header -->
  <h1 style="color: #ffffffe5; font-size: 42px;">
    John Benedict Bonan
    </h1>

  <!-- Profile Picture -->
  <img 
    src="./images/profile.jpeg" 
    alt="Profile Picture"
    style="
      width: 200px;
      height: 200px;
      border-radius: 50%;
      object-fit: cover;
      border: 5px solid #25345f;
      margin-top: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    "
  />

  <!-- Portfolio Description -->
  <p style="
      max-width: 600px;
      margin: 30px auto;
      font-size: 18px;
      line-height: 1.6;
      color: #374151;
      background-color: #ffffffe5;
      padding: 20px;
      border-radius: 10px;
    ">
    Hello! I am passionate about cars because I am a car enthusiast, I like playing video games, assembling model kits such as gundams and I am really into contact sports like boxing.
  </p>

  <!-- Hobbies List -->
  <ul style="
      list-style: none;
      padding: 0;
      margin: 0 auto;
      font-size: 18px;
      color: #1f2937;
      background-color: #ffffffe5;
      display: inline-block;
      padding: 20px 40px;
      border-radius: 10px;
    ">
    <h2>Hobbies</h2>
    <li style="margin: 10px 0;">Assembling Model Kits (Gundams)</li>
    <li style="margin: 10px 0;">Driving My car</li>
    <li style="margin: 10px 0;">Boxing</li>
    <li style="margin: 10px 0;">Video Games</li>
  </ul>

</body>
</html>
